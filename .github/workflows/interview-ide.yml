name: Interview Room

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the interview IDE alive. GitHub-hosted runners stop after 6 hours."
        required: true
        default: "120"
      password:
        description: "Optional room password. Leave blank to generate one."
        required: false
        default: ""
      enable_ai_credentials:
        description: "Pass configured AI CLI secrets into the interview container."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  start:
    name: Start interview room
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      IDE_PORT: "8080"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve session settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          duration="${{ github.event.inputs.duration_minutes }}"
          if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
            echo "duration_minutes must be an integer" >&2
            exit 1
          fi
          if (( duration < 5 || duration > 330 )); then
            echo "duration_minutes must be between 5 and 330" >&2
            exit 1
          fi

          password="${{ github.event.inputs.password }}"
          if [[ -z "$password" ]]; then
            password="$(openssl rand -hex 12)"
          elif ! [[ "$password" =~ ^[A-Za-z0-9._@+-]{8,64}$ ]]; then
            echo "password must be 8-64 chars and only use A-Z, a-z, 0-9, dot, underscore, at, plus, or dash" >&2
            exit 1
          fi

          session_name="coderoom-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          interviewer_token="$(openssl rand -hex 24)"
          candidate_token="$(openssl rand -hex 24)"
          zoom_passcode="$(openssl rand -hex 5)"

          {
            echo "duration=$duration"
            echo "session_name=$session_name"
            echo "interviewer_token=$interviewer_token"
            echo "candidate_token=$candidate_token"
            echo "zoom_passcode=$zoom_passcode"
            echo "password<<EOF"
            echo "$password"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build interview room image
        run: docker build -t interview-ide:latest .

      - name: Start interview room
        env:
          ROOM_PASSWORD: ${{ steps.settings.outputs.password }}
          INTERVIEWER_TOKEN: ${{ steps.settings.outputs.interviewer_token }}
          CANDIDATE_TOKEN: ${{ steps.settings.outputs.candidate_token }}
          INTERVIEW_SESSION_NAME: ${{ steps.settings.outputs.session_name }}
          SESSION_DURATION_MINUTES: ${{ steps.settings.outputs.duration }}
          ZOOM_VIDEO_SDK_KEY: ${{ secrets.ZOOM_VIDEO_SDK_KEY }}
          ZOOM_VIDEO_SDK_SECRET: ${{ secrets.ZOOM_VIDEO_SDK_SECRET }}
          ZOOM_SESSION_NAME: ${{ steps.settings.outputs.session_name }}
          ZOOM_SESSION_PASSCODE: ${{ steps.settings.outputs.zoom_passcode }}
          ZOOM_UI_TOOLKIT_VERSION: ${{ vars.ZOOM_UI_TOOLKIT_VERSION }}
          ENABLE_AI_CREDENTIALS: ${{ inputs.enable_ai_credentials }}
          CODEX_ACCESS_TOKEN: ${{ inputs.enable_ai_credentials && secrets.CODEX_ACCESS_TOKEN || '' }}
          CODEX_AUTH_JSON: ${{ inputs.enable_ai_credentials && secrets.CODEX_AUTH_JSON || '' }}
          OPENAI_API_KEY: ${{ inputs.enable_ai_credentials && secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ inputs.enable_ai_credentials && secrets.ANTHROPIC_API_KEY || '' }}
          ANTHROPIC_AUTH_TOKEN: ${{ inputs.enable_ai_credentials && secrets.ANTHROPIC_AUTH_TOKEN || '' }}
          ANTHROPIC_BASE_URL: ${{ inputs.enable_ai_credentials && vars.ANTHROPIC_BASE_URL || '' }}
          GEMINI_API_KEY: ${{ inputs.enable_ai_credentials && secrets.GEMINI_API_KEY || '' }}
          GOOGLE_API_KEY: ${{ inputs.enable_ai_credentials && secrets.GOOGLE_API_KEY || '' }}
          GOOGLE_CLOUD_PROJECT: ${{ inputs.enable_ai_credentials && vars.GOOGLE_CLOUD_PROJECT || '' }}
          GOOGLE_CLOUD_LOCATION: ${{ inputs.enable_ai_credentials && vars.GOOGLE_CLOUD_LOCATION || '' }}
          GOOGLE_GENAI_USE_VERTEXAI: ${{ inputs.enable_ai_credentials && vars.GOOGLE_GENAI_USE_VERTEXAI || '' }}
        shell: bash
        run: |
          set -euo pipefail

          docker_env_args=(
            -e "ROOM_PASSWORD=$ROOM_PASSWORD"
            -e "INTERVIEWER_TOKEN=$INTERVIEWER_TOKEN"
            -e "CANDIDATE_TOKEN=$CANDIDATE_TOKEN"
            -e "INTERVIEW_SESSION_NAME=$INTERVIEW_SESSION_NAME"
            -e "SESSION_DURATION_MINUTES=$SESSION_DURATION_MINUTES"
            -e "ZOOM_SESSION_NAME=$ZOOM_SESSION_NAME"
            -e "ZOOM_SESSION_PASSCODE=$ZOOM_SESSION_PASSCODE"
          )
          for name in \
            ZOOM_VIDEO_SDK_KEY \
            ZOOM_VIDEO_SDK_SECRET \
            ZOOM_UI_TOOLKIT_VERSION; do
            value="${!name:-}"
            if [[ -n "$value" ]]; then
              docker_env_args+=(-e "$name=$value")
            fi
          done

          if [[ "$ENABLE_AI_CREDENTIALS" == "true" ]]; then
            for name in \
              CODEX_ACCESS_TOKEN \
              CODEX_AUTH_JSON \
              OPENAI_API_KEY \
              ANTHROPIC_API_KEY \
              ANTHROPIC_AUTH_TOKEN \
              ANTHROPIC_BASE_URL \
              GEMINI_API_KEY \
              GOOGLE_API_KEY \
              GOOGLE_CLOUD_PROJECT \
              GOOGLE_CLOUD_LOCATION \
              GOOGLE_GENAI_USE_VERTEXAI; do
              value="${!name:-}"
              if [[ -n "$value" ]]; then
                docker_env_args+=(-e "$name=$value")
              fi
            done
          fi

          docker run -d \
            --name interview-ide \
            --cpus "2" \
            --memory "4g" \
            --pids-limit "512" \
            -p "127.0.0.1:${IDE_PORT}:8080" \
            "${docker_env_args[@]}" \
            interview-ide:latest

          for _ in {1..60}; do
            if curl -fsS "http://127.0.0.1:${IDE_PORT}/healthz" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs interview-ide
          exit 1

      - name: Start Cloudflare quick tunnel
        id: tunnel
        env:
          SESSION_DURATION: ${{ steps.settings.outputs.duration }}
          SESSION_PASSWORD: ${{ steps.settings.outputs.password }}
          INTERVIEWER_TOKEN: ${{ steps.settings.outputs.interviewer_token }}
          CANDIDATE_TOKEN: ${{ steps.settings.outputs.candidate_token }}
          ENABLE_AI_CREDENTIALS: ${{ inputs.enable_ai_credentials }}
        shell: bash
        run: |
          set -euo pipefail

          docker run -d \
            --name cloudflared \
            --network host \
            cloudflare/cloudflared:latest \
            tunnel --no-autoupdate --url "http://127.0.0.1:${IDE_PORT}"

          for _ in {1..60}; do
            docker logs cloudflared > cloudflared.log 2>&1 || true
            tunnel_url="$(grep -Eo 'https://[-a-zA-Z0-9]+\.trycloudflare\.com' cloudflared.log | head -n 1 || true)"

            if [[ -n "$tunnel_url" ]]; then
              echo "url=$tunnel_url" >> "$GITHUB_OUTPUT"
              interviewer_url="${tunnel_url}/room?token=${INTERVIEWER_TOKEN}"
              candidate_url="${tunnel_url}/room?token=${CANDIDATE_TOKEN}"
              echo "interviewer_url=$interviewer_url" >> "$GITHUB_OUTPUT"
              echo "candidate_url=$candidate_url" >> "$GITHUB_OUTPUT"
              {
                echo "## Interview Room"
                echo ""
                echo "- Interviewer URL: $interviewer_url"
                echo "- Candidate URL: $candidate_url"
                echo "- Room password: $SESSION_PASSWORD"
                echo "- Expires after: $SESSION_DURATION minutes"
                echo "- AI CLI credentials enabled: $ENABLE_AI_CREDENTIALS"
                echo ""
                echo "Keep this workflow run open while the interview room is active."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            sleep 2
          done

          cat cloudflared.log
          exit 1

      - name: Print interview connection details
        env:
          SESSION_URL: ${{ steps.tunnel.outputs.url }}
          INTERVIEWER_URL: ${{ steps.tunnel.outputs.interviewer_url }}
          CANDIDATE_URL: ${{ steps.tunnel.outputs.candidate_url }}
          SESSION_PASSWORD: ${{ steps.settings.outputs.password }}
          SESSION_DURATION: ${{ steps.settings.outputs.duration }}
          ENABLE_AI_CREDENTIALS: ${{ inputs.enable_ai_credentials }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Interview room URL: $SESSION_URL"
          echo "Interviewer URL: $INTERVIEWER_URL"
          echo "Candidate URL: $CANDIDATE_URL"
          echo "Room password: $SESSION_PASSWORD"
          echo "Interview room expires after: $SESSION_DURATION minutes"
          echo "AI CLI credentials enabled: $ENABLE_AI_CREDENTIALS"
          echo "::notice title=Interview Room::Interviewer: $INTERVIEWER_URL | Candidate: $CANDIDATE_URL | Password: $SESSION_PASSWORD | Expires after: $SESSION_DURATION minutes | AI credentials: $ENABLE_AI_CREDENTIALS"

      - name: Keep interview session alive
        shell: bash
        run: |
          set -euo pipefail
          echo "Interview room is live: ${{ steps.tunnel.outputs.url }}"
          echo "The job will sleep for ${{ steps.settings.outputs.duration }} minutes."
          sleep "$(( ${{ steps.settings.outputs.duration }} * 60 ))"

      - name: Collect interview artifacts
        if: always()
        shell: bash
        run: |
          set -u

          mkdir -p artifacts
          docker cp interview-ide:/home/coder/project artifacts/project 2>/dev/null || true
          docker logs interview-ide > artifacts/code-server.log 2>&1 || true
          docker logs cloudflared > artifacts/cloudflared.log 2>&1 || true

      - name: Upload interview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interview-session-${{ github.run_id }}
          path: artifacts
          if-no-files-found: ignore
